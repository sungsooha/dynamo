apiVersion: batch/v1
kind: Job
metadata:
  name: ultra-aiperf-agg2-chat-c64
  labels:
    app: ultra-aiperf-agg2-chat-c64
    track: nemotron-ultra-phase0-v2-k8s
    action-id: K8S_VLLM_PATCH06_AGG2_MOONTRACE_CHAT_C64_256K_NEWPVC
    stage: moontrace-chat-c64
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 28800
  template:
    metadata:
      labels:
        app: ultra-aiperf-agg2-chat-c64
        track: nemotron-ultra-phase0-v2-k8s
        action-id: K8S_VLLM_PATCH06_AGG2_MOONTRACE_CHAT_C64_256K_NEWPVC
        stage: moontrace-chat-c64
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      imagePullSecrets:
      - name: nvcr-secret
      containers:
      - name: aiperf-moontrace
        image: nvcr.io/nvstaging/nim/sungsooh:nemotron-ultra-aiperf-client-0.8.0-tokenizers-20260522T204015Z@sha256:ebbb3bf5e2e2c09f34e742db18ab7ef6cfb01721050aeec7a4a77473f53fb4d4
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: '4'
            memory: 16Gi
          limits:
            cpu: '8'
            memory: 32Gi
        env:
        - name: BASE_URL
          value: http://ultra-vllm-p06h-agg2-chat-c64-frontend:8000
        - name: MODEL
          value: nemotron-ultra-ea
        - name: TOKENIZER_PATH
          value: /opt/models/patched/nemotron-ultra-ea-trtllm-tokenizer-patch-469ed01fa35dbc5e962a7d78bdbd9548872e9844
        - name: TRACE_FILE
          value: /artifacts/trace_preflight/prep_chat_256k/filtered_traces/chat_maxlen262144_oslcap1024_margin512.jsonl
        - name: EXPECTED_TRACE_SHA256
          value: 1efbdba25d51e8e325fdc3b48cca75c044547a134ab3c888e06f68b10207fc14
        - name: EXPECTED_REQUEST_COUNT
          value: '11854'
        - name: ARTIFACT_DIR
          value: /artifacts/runs/agg2-chat-c64
        - name: HF_HOME
          value: /opt/models
        - name: HF_HUB_CACHE
          value: /opt/models/hub
        - name: HF_HUB_OFFLINE
          value: '1'
        - name: TRANSFORMERS_OFFLINE
          value: '1'
        - name: HF_DATASETS_OFFLINE
          value: '1'
        - name: CONCURRENCY
          value: '64'
        - name: WORKERS_MAX
          value: '64'
        - name: CUSTOM_DATASET_TYPE
          value: mooncake-trace
        - name: PROMPT_INPUT_TOKENS_BLOCK_SIZE
          value: '512'
        - name: SYNTHESIS_MAX_ISL
          value: '260608'
        - name: SYNTHESIS_MAX_OSL
          value: '1024'
        - name: CACHE_SALT_MODE
          value: omit_fresh_dgd
        command:
        - /bin/bash
        - -lc
        args:
        - "set -euo pipefail\nmkdir -p \"${ARTIFACT_DIR}/client_setup\" \"${ARTIFACT_DIR}/commands\"\
          \ \"${ARTIFACT_DIR}/logs\" \"${ARTIFACT_DIR}/trace\"\necho \"AIPERF_AGG2_CHAT_C64_BEGIN\
          \ $(date -u +%Y-%m-%dT%H:%M:%SZ)\" | tee \"${ARTIFACT_DIR}/logs/run.log\"\
          \ndf -h /artifacts | tee \"${ARTIFACT_DIR}/client_setup/df_h_before.txt\"\
          \ndf -Pk /artifacts | tee \"${ARTIFACT_DIR}/client_setup/df_pk_before.txt\"\
          \ntest -r \"${TRACE_FILE}\"\nsha256sum \"${TRACE_FILE}\" | tee \"${ARTIFACT_DIR}/trace/trace.sha256\"\
          \nactual_sha=\"$(awk '{print $1}' \"${ARTIFACT_DIR}/trace/trace.sha256\"\
          )\"\ntest \"${actual_sha}\" = \"${EXPECTED_TRACE_SHA256}\"\nrequest_count=\"\
          $(wc -l <\"${TRACE_FILE}\" | tr -d ' ')\"\ntest \"${request_count}\" = \"\
          ${EXPECTED_REQUEST_COUNT}\"\nprintf '%s\\n' \"${request_count}\" | tee \"\
          ${ARTIFACT_DIR}/trace/request_count.txt\"\nenv | grep -E '^(BASE_URL|MODEL|TOKENIZER_PATH|TRACE_FILE|EXPECTED_TRACE_SHA256|EXPECTED_REQUEST_COUNT|ARTIFACT_DIR|CONCURRENCY|WORKERS_MAX|CUSTOM_DATASET_TYPE|PROMPT_INPUT_TOKENS_BLOCK_SIZE|SYNTHESIS_MAX_ISL|SYNTHESIS_MAX_OSL|CACHE_SALT_MODE|HF_HOME|HF_HUB_CACHE|HF_HUB_OFFLINE|TRANSFORMERS_OFFLINE|HF_DATASETS_OFFLINE)='\
          \ | sort | tee \"${ARTIFACT_DIR}/run_env.txt\"\npython3 --version | tee\
          \ \"${ARTIFACT_DIR}/client_setup/python_version.txt\"\npython3 - <<'PYDEP'\
          \ | tee \"${ARTIFACT_DIR}/client_setup/dependency_versions.txt\"\nimport\
          \ importlib.metadata as md\nfor name in [\"sentencepiece\", \"tiktoken\"\
          , \"regex\", \"requests\", \"tokenizers\", \"transformers\"]:\n    try:\n\
          \        print(f\"{name}=={md.version(name)}\")\n    except md.PackageNotFoundError:\n\
          \        print(f\"{name}=MISSING\")\nPYDEP\nCOLUMNS=240 aiperf profile --help\
          \ >\"${ARTIFACT_DIR}/client_setup/aiperf_profile_help.txt\" 2>&1\ngrep -q\
          \ -- 'mooncake-trace' \"${ARTIFACT_DIR}/client_setup/aiperf_profile_help.txt\"\
          \ntokenizer_smoke_ultra.sh >\"${ARTIFACT_DIR}/client_setup/tokenizer_smoke.log\"\
          \ 2>&1\ntail -n 20 \"${ARTIFACT_DIR}/client_setup/tokenizer_smoke.log\"\
          \ | tee -a \"${ARTIFACT_DIR}/logs/run.log\"\nif grep -q -- '--num-requests'\
          \ \"${ARTIFACT_DIR}/client_setup/aiperf_profile_help.txt\"; then request_flag=\"\
          --num-requests\"; else request_flag=\"--request-count\"; fi\npython3 - <<'PYSCRIPT'\n\
          import os, pathlib, stat\nscript = pathlib.Path(os.environ[\"ARTIFACT_DIR\"\
          ]) / \"commands\" / \"run_aiperf_chat_c64.sh\"\ntext = \"\"\"#!/usr/bin/env\
          \ bash\nset -euo pipefail\nargs=(\n  profile\n  -m \"${MODEL}\"\n  -u \"\
          ${BASE_URL}\"\n  --endpoint v1/chat/completions\n  --endpoint-type chat\n\
          \  --streaming\n  --input-file \"${TRACE_FILE}\"\n  --custom-dataset-type\
          \ \"${CUSTOM_DATASET_TYPE}\"\n  --dataset-sampling-strategy sequential\n\
          \  --concurrency \"${CONCURRENCY}\"\n  --workers-max \"${WORKERS_MAX}\"\n\
          \  --prompt-input-tokens-block-size \"${PROMPT_INPUT_TOKENS_BLOCK_SIZE}\"\
          \n  --synthesis-max-isl \"${SYNTHESIS_MAX_ISL}\"\n  --synthesis-max-osl\
          \ \"${SYNTHESIS_MAX_OSL}\"\n  --tokenizer \"${TOKENIZER_PATH}\"\n  --tokenizer-trust-remote-code\n\
          \  --extra-inputs ignore_eos:true\n  --use-server-token-count\n  --random-seed\
          \ 42\n  --export-level records\n  --ui-type none\n  --no-server-metrics\n\
          \  --artifact-dir \"${ARTIFACT_DIR}\"\n)\nif [[ \"${REQUEST_FLAG}\" == \"\
          --num-requests\" ]]; then\n  args+=(--num-requests \"${REQUEST_COUNT}\"\
          )\nelse\n  args+=(--request-count \"${REQUEST_COUNT}\")\nfi\nCOLUMNS=240\
          \ exec aiperf \"${args[@]}\"\n\"\"\"\nscript.write_text(text.replace(\"\
          \              \", \"\"), encoding=\"utf-8\", newline=\"\\n\")\nscript.chmod(script.stat().st_mode\
          \ | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)\nPYSCRIPT\nREQUEST_FLAG=\"\
          ${request_flag}\" REQUEST_COUNT=\"${request_count}\" bash -n \"${ARTIFACT_DIR}/commands/run_aiperf_chat_c64.sh\"\
          \nsed -n '1,180p' \"${ARTIFACT_DIR}/commands/run_aiperf_chat_c64.sh\" |\
          \ tee \"${ARTIFACT_DIR}/client_setup/run_script_preview.txt\"\nset +e\n\
          REQUEST_FLAG=\"${request_flag}\" REQUEST_COUNT=\"${request_count}\" bash\
          \ \"${ARTIFACT_DIR}/commands/run_aiperf_chat_c64.sh\" 2>&1 | tee \"${ARTIFACT_DIR}/logs/aiperf_profile.log\"\
          \nrc=${PIPESTATUS[0]}\nset -e\ndf -h /artifacts | tee \"${ARTIFACT_DIR}/client_setup/df_h_after.txt\"\
          \ndf -Pk /artifacts | tee \"${ARTIFACT_DIR}/client_setup/df_pk_after.txt\"\
          \npython3 - <<'PYMANIFEST'\nimport os, pathlib\nroot = pathlib.Path(os.environ[\"\
          ARTIFACT_DIR\"])\nrows = []\nfor path in sorted(p for p in root.rglob(\"\
          *\") if p.is_file()):\n    rows.append(f\"{path}\\t{path.stat().st_size}\"\
          )\n(root / \"manifest.tsv\").write_text(\"\\n\".join(rows) + \"\\n\")\n\
          PYMANIFEST\necho \"AIPERF_AGG2_CHAT_C64_END rc=${rc} $(date -u +%Y-%m-%dT%H:%M:%SZ)\"\
          \ | tee -a \"${ARTIFACT_DIR}/logs/run.log\"\nexit \"${rc}\"\n"
        volumeMounts:
        - name: shared-model-cache
          mountPath: /opt/models
          readOnly: true
        - name: bench-artifacts
          mountPath: /artifacts
      volumes:
      - name: shared-model-cache
        persistentVolumeClaim:
          claimName: shared-model-cache
      - name: bench-artifacts
        persistentVolumeClaim:
          claimName: nemotron-ultra-aiperf-artifacts
