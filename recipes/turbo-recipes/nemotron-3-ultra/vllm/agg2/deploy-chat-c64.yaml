apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: ultra-vllm-p06h-agg2-chat-c64
  labels:
    app.kubernetes.io/name: ultra-vllm-p06h-agg2-chat-c64
    app.kubernetes.io/part-of: nemotron-ultra-phase0-v2-k8s
    nemotron-ultra.nvidia.com/backend: vllm-patch06-humming
    nemotron-ultra.nvidia.com/topology: agg2-tp4x2
    nemotron-ultra.nvidia.com/workload: chat
  annotations:
    nemotron-ultra.nvidia.com/status: agg2-moontrace-newpvc-candidate-requires-discovery-isolation
    nemotron-ultra.nvidia.com/not-pd-evidence: 'true'
    nemotron-ultra.nvidia.com/evidence-scope: aggregate_k8s_moontrace_agg2_not_pd_not_nixl
    nemotron-ultra.nvidia.com/image-digest: sha256:23aca0f5c5a332e5ddd69899ed2026cdf7abee5c28a4f2b96d54915e2211a337
    nemotron-ultra.nvidia.com/action-id: K8S_VLLM_PATCH06_AGG2_MOONTRACE_CHAT_C64_256K_NEWPVC
spec:
  backendFramework: vllm
  env:
  - name: HF_HOME
    value: /opt/models
  - name: HF_HUB_CACHE
    value: /opt/models/hub
  - name: HF_HUB_OFFLINE
    value: '1'
  - name: TRANSFORMERS_OFFLINE
    value: '1'
  - name: SERVED_MODEL_NAME
    value: nemotron-ultra-ea
  - name: MODEL_PATH
    value: /opt/models/patched/nemotron-ultra-ea-trtllm-tokenizer-patch-469ed01fa35dbc5e962a7d78bdbd9548872e9844
  - name: MODEL_CACHE_ROOT
    value: /opt/models
  - name: LOG_DIR
    value: /artifacts/logs
  - name: HOME
    value: /tmp
  - name: HF_MODULES_CACHE
    value: /tmp/hf_modules
  - name: XDG_CACHE_HOME
    value: /tmp/cache
  - name: TORCH_EXTENSIONS_DIR
    value: /tmp/torch_extensions
  - name: TRITON_CACHE_DIR
    value: /tmp/triton
  - name: VLLM_CACHE_ROOT
    value: /tmp/vllm
  - name: PYTHONHASHSEED
    value: '0'
  - name: VLLM_LOGGING_LEVEL
    value: INFO
  - name: VLLM_WORKER_MULTIPROC_METHOD
    value: spawn
  - name: VLLM_ALLREDUCE_USE_SYMM_MEM
    value: '0'
  - name: VLLM_SSM_CONV_STATE_LAYOUT
    value: DS
  - name: VLLM_ALLOW_CHUNKED_LOCAL_ATTN_WITH_HYBRID_KV_CACHE
    value: '1'
  - name: DYN_VLLM_APPEND_PREFILL_OUTPUT_TOKENS
    value: '0'
  - name: NCCL_IB_DISABLE
    value: '1'
  - name: NCCL_CUMEM_ENABLE
    value: '1'
  - name: NCCL_NVLS_ENABLE
    value: '1'
  - name: DYN_LOG
    value: info,dynamo_kv_router=debug,dynamo_llm::kv_router=debug
  components:
  - name: Frontend
    type: frontend
    replicas: 1
    podTemplate:
      metadata:
        labels:
          nemotron-ultra.nvidia.com/role: frontend
          nemotron-ultra.nvidia.com/workload: chat
          nemotron-ultra.nvidia.com/topology: agg2-tp4x2
      spec:
        imagePullSecrets:
        - name: nvcr-secret
        containers:
        - name: main
          image: nvcr.io/nvstaging/nim/sungsooh:nemotron-ultra-vllm-upstream-pd-mamba-patch06-humming-20260521@sha256:23aca0f5c5a332e5ddd69899ed2026cdf7abee5c28a4f2b96d54915e2211a337
          imagePullPolicy: IfNotPresent
          command:
          - /bin/bash
          - -lc
          args:
          - "exec python3 -m dynamo.frontend \\\n  --router-mode kv \\\n  --router-kv-events\
            \ \\\n  --kv-cache-block-size 64 \\\n  --router-reset-states \\\n  --http-host\
            \ 0.0.0.0 \\\n  --http-port 8000\n"
          ports:
          - name: http
            containerPort: 8000
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 360
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
          - name: shared-model-cache
            mountPath: /opt/models
            readOnly: true
          - name: artifact-root
            mountPath: /artifacts
          - name: runtime-tmp
            mountPath: /tmp
        volumes:
        - name: shared-model-cache
          persistentVolumeClaim:
            claimName: shared-model-cache
        - name: artifact-root
          persistentVolumeClaim:
            claimName: nemotron-ultra-aiperf-artifacts
        - name: runtime-tmp
          emptyDir: {}
  - name: VllmWorker
    type: worker
    replicas: 2
    sharedMemorySize: 64Gi
    podTemplate:
      metadata:
        labels:
          nemotron-ultra.nvidia.com/role: aggregate-worker
          nemotron-ultra.nvidia.com/workload: chat
          nemotron-ultra.nvidia.com/topology: agg2-tp4x2
      spec:
        imagePullSecrets:
        - name: nvcr-secret
        runtimeClassName: nvidia
        nodeSelector:
          nvidia.com/gpu.product: NVIDIA-B200
        tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: 'true'
          effect: NoSchedule
        containers:
        - name: main
          image: nvcr.io/nvstaging/nim/sungsooh:nemotron-ultra-vllm-upstream-pd-mamba-patch06-humming-20260521@sha256:23aca0f5c5a332e5ddd69899ed2026cdf7abee5c28a4f2b96d54915e2211a337
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          command:
          - /bin/bash
          - -lc
          args:
          - "set -Eeuo pipefail\necho \"PRESTART_GPU_GUARD_BEGIN role=agg workload=chat\
            \ ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)\"\necho \"CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-}\"\
            \necho \"NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-}\"\nnvidia-smi\
            \ -L\nnvidia-smi --query-gpu=index,uuid,memory.total,memory.used,memory.free,utilization.gpu\
            \ --format=csv,noheader,nounits\nvisible_count=\"$(nvidia-smi -L | grep\
            \ -c '^GPU ')\"\nif [ \"${visible_count}\" -ne 4 ]; then\n  echo \"PRESTART_GPU_GUARD_FAIL\
            \ class=prestart_gpu_visibility_count_mismatch role=agg workload=chat\
            \ visible_count=${visible_count}\"\n  exit 96\nfi\nmem_rows=\"$(nvidia-smi\
            \ --query-gpu=index,uuid,memory.used,utilization.gpu --format=csv,noheader,nounits)\"\
            \necho \"${mem_rows}\"\ndirty_count=\"$(printf '%s\\n' \"${mem_rows}\"\
            \ | awk -F',' '{gsub(/ /,\"\",$3); if (($3+0)>1024) c++} END{print c+0}')\"\
            \nif [ \"${dirty_count}\" -ne 0 ]; then\n  echo \"PRESTART_GPU_GUARD_FAIL\
            \ class=prestart_gpu_memory_dirty role=agg workload=chat dirty_count=${dirty_count}\"\
            \n  exit 97\nfi\ncompute_apps=\"$(nvidia-smi --query-compute-apps=gpu_uuid,pid,process_name,used_memory\
            \ --format=csv,noheader,nounits || true)\"\nif [ -n \"${compute_apps}\"\
            \ ]; then\n  printf '%s\\n' \"${compute_apps}\"\n  echo \"PRESTART_GPU_GUARD_FAIL\
            \ class=prestart_gpu_compute_apps_visible role=agg workload=chat\"\n \
            \ exit 98\nfi\necho \"PRESTART_GPU_GUARD_PASS role=agg workload=chat\"\
            \nulimit -l unlimited\nexec python3 -m dynamo.vllm \\\n  --model \"${MODEL_PATH}\"\
            \ \\\n  --served-model-name \"${SERVED_MODEL_NAME}\" \\\n  --tensor-parallel-size\
            \ 4 \\\n  --trust-remote-code \\\n  --max-model-len 262144 \\\n  --max-num-seqs\
            \ 32 \\\n  --max-num-batched-tokens 32768 \\\n  --gpu-memory-utilization\
            \ 0.9 \\\n  --block-size 64 \\\n  --enable-expert-parallel \\\n  --mamba-cache-mode\
            \ align \\\n  --enable-prefix-caching \\\n  --dyn-tool-call-parser qwen3_coder\
            \ \\\n  --dyn-reasoning-parser nemotron3 \\\n  --reasoning-parser-plugin\
            \ \"${MODEL_PATH}/ultra_v3_reasoning_parser.py\" \\\n  --reasoning-parser\
            \ nemotron_v3 \\\n  --no-disable-hybrid-kv-cache-manager\n"
          envFrom:
          - secretRef:
              name: hf-token-secret
          env:
          - name: HF_HOME
            value: /opt/models
          - name: HF_MODULES_CACHE
            value: /tmp/hf_modules
          - name: TRITON_CACHE_DIR
            value: /tmp/triton
          - name: VLLM_CONFIG_ROOT
            value: /tmp/vllm-config
          - name: VLLM_CACHE_ROOT
            value: /tmp/vllm-cache
          resources:
            requests:
              nvidia.com/gpu: '4'
              memory: 750Gi
              ephemeral-storage: 20Gi
            limits:
              nvidia.com/gpu: '4'
          securityContext:
            capabilities:
              add:
              - IPC_LOCK
              - SYS_RESOURCE
            runAsUser: 0
            runAsGroup: 0
          startupProbe:
            httpGet:
              path: /live
              port: 9090
            periodSeconds: 60
            timeoutSeconds: 20
            failureThreshold: 30
          volumeMounts:
          - name: shared-model-cache
            mountPath: /opt/models
            readOnly: true
          - name: artifact-root
            mountPath: /artifacts
          - name: runtime-tmp
            mountPath: /tmp
          - name: flashinfer-cubins
            mountPath: /usr/local/lib/python3.12/dist-packages/flashinfer_cubin/cubins/flashinfer
        volumes:
        - name: shared-model-cache
          persistentVolumeClaim:
            claimName: shared-model-cache
        - name: artifact-root
          persistentVolumeClaim:
            claimName: nemotron-ultra-aiperf-artifacts
        - name: runtime-tmp
          emptyDir: {}
        - name: flashinfer-cubins
          emptyDir:
            medium: Memory
