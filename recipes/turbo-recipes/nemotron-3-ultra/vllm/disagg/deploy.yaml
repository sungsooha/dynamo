#
# Draft DynamoGraphDeployment for Nemotron-3-Ultra vLLM Patch05 TP4 1P+1D.
#
# Status: draft only. The passing B200 evidence was collected with direct Docker
# using the launch_*.sh scripts in ../. This DGD captures the same vLLM/Dynamo
# settings for Kubernetes recipe work, but still needs validation with the
# target Dynamo operator, model-cache PVC layout, pod networking, and image pull
# access.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: nemotron-ultra-vllm-disagg
spec:
  backendFramework: vllm
  pvcs:
    - name: model-cache
      create: false
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvstaging/nim/sungsooh:nemotron-ultra-dynamo-vllm-pr9669-vllm0.21.0-kvpatch-20260520-mamba-hma-pr42430
          workingDir: /workspace
          env:
            - name: HF_HOME
              value: /opt/models
            - name: PYTHONHASHSEED
              value: "0"
            - name: DYN_LOG
              value: info,dynamo_kv_router=debug,dynamo_llm::kv_router=debug
          command:
            - /bin/sh
            - -c
          args:
            - >-
              python3 -m dynamo.frontend
              --discovery-backend etcd
              --request-plane tcp
              --event-plane zmq
              --router-mode kv
              --router-kv-events
              --kv-cache-block-size 64
              --router-reset-states
              --http-host 0.0.0.0
              --http-port 8000
    VllmPrefillWorker:
      componentType: worker
      subComponentType: prefill
      envFromSecret: hf-token-secret
      replicas: 1
      resources:
        limits:
          gpu: "4"
        requests:
          gpu: "4"
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      sharedMemory:
        size: 64Gi
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvstaging/nim/sungsooh:nemotron-ultra-dynamo-vllm-pr9669-vllm0.21.0-kvpatch-20260520-mamba-hma-pr42430
          workingDir: /workspace
          env:
            - name: HF_HOME
              value: /opt/models
            - name: HF_HUB_CACHE
              value: /opt/models/hub
            - name: SERVED_MODEL_NAME
              value: nemotron-ultra-ea
            - name: MODEL_PATH
              value: /opt/models/patched/nemotron-ultra-ea-trtllm-tokenizer-patch-469ed01fa35dbc5e962a7d78bdbd9548872e9844
            - name: PYTHONHASHSEED
              value: "0"
            - name: VLLM_LOGGING_LEVEL
              value: INFO
            - name: VLLM_WORKER_MULTIPROC_METHOD
              value: spawn
            - name: VLLM_ALLREDUCE_USE_SYMM_MEM
              value: "0"
            - name: VLLM_SSM_CONV_STATE_LAYOUT
              value: DS
            - name: VLLM_ALLOW_CHUNKED_LOCAL_ATTN_WITH_HYBRID_KV_CACHE
              value: "1"
            - name: DYN_VLLM_APPEND_PREFILL_OUTPUT_TOKENS
              value: "0"
          command:
            - /bin/sh
            - -c
          args:
            - >-
              ulimit -l unlimited &&
              python3 -m dynamo.vllm
              --discovery-backend etcd
              --request-plane tcp
              --event-plane zmq
              --model "$MODEL_PATH"
              --served-model-name "$SERVED_MODEL_NAME"
              --tensor-parallel-size 4
              --trust-remote-code
              --max-model-len 65536
              --max-num-seqs 16
              --max-num-batched-tokens 32768
              --gpu-memory-utilization 0.9
              --block-size 64
              --enable-expert-parallel
              --mamba-cache-mode align
              --enable-prefix-caching
              --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
              --dyn-tool-call-parser qwen3_coder
              --dyn-reasoning-parser nemotron3
              --reasoning-parser-plugin "$MODEL_PATH/ultra_v3_reasoning_parser.py"
              --reasoning-parser nemotron_v3
              --no-disable-hybrid-kv-cache-manager
              --disaggregation-mode prefill
              --kv-events-config '{"publisher":"zmq","topic":"kv-events","endpoint":"tcp://*:5571","enable_kv_cache_events":true}'
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
                - SYS_RESOURCE
          volumeMounts:
            - mountPath: /opt/dynamo/venv/lib/python3.12/site-packages/flashinfer_cubin/cubins/flashinfer
              name: flashinfer-cubins
        volumes:
          - name: flashinfer-cubins
            emptyDir:
              medium: Memory
    VllmDecodeWorker:
      componentType: worker
      subComponentType: decode
      envFromSecret: hf-token-secret
      replicas: 1
      resources:
        limits:
          gpu: "4"
        requests:
          gpu: "4"
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      sharedMemory:
        size: 64Gi
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvstaging/nim/sungsooh:nemotron-ultra-dynamo-vllm-pr9669-vllm0.21.0-kvpatch-20260520-mamba-hma-pr42430
          workingDir: /workspace
          env:
            - name: HF_HOME
              value: /opt/models
            - name: HF_HUB_CACHE
              value: /opt/models/hub
            - name: SERVED_MODEL_NAME
              value: nemotron-ultra-ea
            - name: MODEL_PATH
              value: /opt/models/patched/nemotron-ultra-ea-trtllm-tokenizer-patch-469ed01fa35dbc5e962a7d78bdbd9548872e9844
            - name: PYTHONHASHSEED
              value: "0"
            - name: VLLM_LOGGING_LEVEL
              value: INFO
            - name: VLLM_WORKER_MULTIPROC_METHOD
              value: spawn
            - name: VLLM_ALLREDUCE_USE_SYMM_MEM
              value: "0"
            - name: VLLM_SSM_CONV_STATE_LAYOUT
              value: DS
            - name: VLLM_ALLOW_CHUNKED_LOCAL_ATTN_WITH_HYBRID_KV_CACHE
              value: "1"
            - name: DYN_VLLM_APPEND_PREFILL_OUTPUT_TOKENS
              value: "0"
          command:
            - /bin/sh
            - -c
          args:
            - >-
              ulimit -l unlimited &&
              python3 -m dynamo.vllm
              --discovery-backend etcd
              --request-plane tcp
              --event-plane zmq
              --model "$MODEL_PATH"
              --served-model-name "$SERVED_MODEL_NAME"
              --tensor-parallel-size 4
              --trust-remote-code
              --max-model-len 65536
              --max-num-seqs 16
              --max-num-batched-tokens 32768
              --gpu-memory-utilization 0.9
              --block-size 64
              --enable-expert-parallel
              --mamba-cache-mode align
              --enable-prefix-caching
              --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
              --dyn-tool-call-parser qwen3_coder
              --dyn-reasoning-parser nemotron3
              --reasoning-parser-plugin "$MODEL_PATH/ultra_v3_reasoning_parser.py"
              --reasoning-parser nemotron_v3
              --no-disable-hybrid-kv-cache-manager
              --disaggregation-mode decode
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
                - SYS_RESOURCE
          volumeMounts:
            - mountPath: /opt/dynamo/venv/lib/python3.12/site-packages/flashinfer_cubin/cubins/flashinfer
              name: flashinfer-cubins
        volumes:
          - name: flashinfer-cubins
            emptyDir:
              medium: Memory
