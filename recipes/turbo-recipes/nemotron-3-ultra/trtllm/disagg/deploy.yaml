apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: nemotron-ultra-trtllm-disagg
spec:
  backendFramework: trtllm
  pvcs:
    - name: model-cache
      create: false
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvstaging/nim/sungsooh:nemotron-ultra-dynamo-trtllm-base501a580-pr14060-9c9cde-sm100-donordeps-20260520
          env:
            - name: DYN_DISCOVERY_BACKEND
              value: file
            - name: DYN_REQUEST_PLANE
              value: tcp
            - name: DYN_EVENT_PLANE
              value: zmq
          command:
            - /bin/sh
            - -c
          args:
            - >-
              python3 -m dynamo.frontend
              --discovery-backend file
              --router-mode kv
              --router-kv-events
              --kv-cache-block-size 32
              --router-kv-overlap-score-weight 1.0
              --router-temperature 0.0
              --http-port 8000
    TrtllmPrefillWorker:
      componentType: worker
      subComponentType: prefill
      envFromSecret: hf-token-secret
      replicas: 1
      resources:
        limits:
          gpu: "4"
        requests:
          gpu: "4"
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      sharedMemory:
        size: 64Gi
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvstaging/nim/sungsooh:nemotron-ultra-dynamo-trtllm-base501a580-pr14060-9c9cde-sm100-donordeps-20260520
          env:
            - name: HF_HOME
              value: /opt/models
            - name: MODEL_PATH
              value: /opt/models/patched/nemotron-ultra-ea-trtllm-tokenizer-patch-469ed01fa35dbc5e962a7d78bdbd9548872e9844
            - name: ENGINE_ARGS
              value: /opt/dynamo/configs/config.yaml
            - name: TRTLLM_NO_USAGE_STATS
              value: "1"
            - name: DYN_DISCOVERY_BACKEND
              value: file
            - name: DYN_REQUEST_PLANE
              value: tcp
            - name: DYN_EVENT_PLANE
              value: zmq
            - name: HF_MODULES_CACHE
              value: /tmp/hf_modules
            - name: XDG_CACHE_HOME
              value: /tmp/cache
            - name: TORCH_EXTENSIONS_DIR
              value: /tmp/torch_extensions
          command:
            - /bin/sh
            - -c
          args:
            - >-
              python3 -m dynamo.trtllm
              --discovery-backend file
              --model-path "$MODEL_PATH"
              --served-model-name nemotron-ultra-ea
              --extra-engine-args "$ENGINE_ARGS"
              --modality text
              --disaggregation-mode prefill
              --dyn-tool-call-parser nemotron_nano
              --dyn-reasoning-parser nemotron_nano
              --publish-events-and-metrics
              --kv-block-size 32
          volumeMounts:
            - mountPath: /opt/dynamo/configs
              name: nemotron-ultra-trtllm-prefill-config
              readOnly: true
        volumes:
          - configMap:
              name: nemotron-ultra-trtllm-prefill-config
            name: nemotron-ultra-trtllm-prefill-config
    TrtllmDecodeWorker:
      componentType: worker
      subComponentType: decode
      envFromSecret: hf-token-secret
      replicas: 1
      resources:
        limits:
          gpu: "4"
        requests:
          gpu: "4"
      volumeMounts:
        - name: model-cache
          mountPoint: /opt/models
      sharedMemory:
        size: 64Gi
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvstaging/nim/sungsooh:nemotron-ultra-dynamo-trtllm-base501a580-pr14060-9c9cde-sm100-donordeps-20260520
          env:
            - name: HF_HOME
              value: /opt/models
            - name: MODEL_PATH
              value: /opt/models/patched/nemotron-ultra-ea-trtllm-tokenizer-patch-469ed01fa35dbc5e962a7d78bdbd9548872e9844
            - name: ENGINE_ARGS
              value: /opt/dynamo/configs/config.yaml
            - name: TRTLLM_NO_USAGE_STATS
              value: "1"
            - name: DYN_DISCOVERY_BACKEND
              value: file
            - name: DYN_REQUEST_PLANE
              value: tcp
            - name: DYN_EVENT_PLANE
              value: zmq
            - name: HF_MODULES_CACHE
              value: /tmp/hf_modules
            - name: XDG_CACHE_HOME
              value: /tmp/cache
            - name: TORCH_EXTENSIONS_DIR
              value: /tmp/torch_extensions
          command:
            - /bin/sh
            - -c
          args:
            - >-
              python3 -m dynamo.trtllm
              --discovery-backend file
              --model-path "$MODEL_PATH"
              --served-model-name nemotron-ultra-ea
              --extra-engine-args "$ENGINE_ARGS"
              --modality text
              --disaggregation-mode decode
              --dyn-tool-call-parser nemotron_nano
              --dyn-reasoning-parser nemotron_nano
              --publish-events-and-metrics
              --kv-block-size 32
          volumeMounts:
            - mountPath: /opt/dynamo/configs
              name: nemotron-ultra-trtllm-decode-config
              readOnly: true
        volumes:
          - configMap:
              name: nemotron-ultra-trtllm-decode-config
            name: nemotron-ultra-trtllm-decode-config
